{
  "rules": {
    "barbearia": {
      "users": {
        ".read": "root.child('barbearia/users/' + auth.uid + '/role').val() === 'admin'",
        "$uid": {
          ".read": "auth.uid === $uid",
          ".write": "auth.uid === $uid"
        }
      },
      "appointments": {
        ".read": "auth != null",
        ".write": "auth != null"
      }
    }
  }
}
